<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Toolset</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 6.5.1 (Bản mới nhất, khắc phục lỗi không hiện icon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" xintegrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        /* Tùy chỉnh thanh cuộn cho nền tối xám */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(24, 24, 27, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(113, 113, 122, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(161, 161, 170, 0.8); }
        
        /* Hiệu ứng chuyển tab mượt (Tông Đen Xám) */
        .tab-active { background: rgba(63, 63, 70, 0.5); border-color: rgba(161, 161, 170, 0.5); color: #f4f4f5; }
        .tab-inactive { background: rgba(24, 24, 27, 0.4); border-color: rgba(255, 255, 255, 0.05); color: #a1a1aa; }
        .tab-inactive:hover { background: rgba(39, 39, 42, 0.6); color: #e4e4e7; border-color: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen font-sans relative overflow-x-hidden bg-zinc-950 text-zinc-200 selection:bg-zinc-600/50 selection:text-white">

    <!-- Background Animated Blobs for Dark Gray Glassmorphism Effect -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-zinc-600 opacity-10 blur-[100px] animate-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-neutral-600 opacity-10 blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>
        <div class="absolute top-[30%] left-[60%] w-[30%] h-[30%] rounded-full bg-zinc-500 opacity-10 blur-[90px] animate-pulse" style="animation-delay: 4s;"></div>
    </div>

    <!-- Main Container -->
    <div class="relative z-10 container mx-auto px-4 py-8 max-w-[1600px]">
        
        <!-- Header Section -->
        <div class="mb-6 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold mb-3 text-transparent bg-clip-text bg-gradient-to-r from-zinc-100 to-zinc-500 drop-shadow-sm">
                Dev Toolset Glassmorphism
            </h1>
            <p class="text-base text-zinc-400 font-medium">
                Công cụ tối giản hỗ trợ chọn Màu sắc & Hơn 350+ Icon FontAwesome cho R / Web
            </p>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex justify-center mb-4 gap-4 px-2 flex-wrap">
            <button onclick="switchTab('colors')" id="tab-colors" class="tab-active backdrop-blur-md px-6 py-3 rounded-xl border font-semibold flex items-center gap-2 transition-all duration-300 shadow-lg">
                <i class="fa-solid fa-palette text-lg"></i>
                Bảng Màu CSS / R Base
            </button>
            <button onclick="switchTab('icons')" id="tab-icons" class="tab-inactive backdrop-blur-md px-6 py-3 rounded-xl border font-semibold flex items-center gap-2 transition-all duration-300 shadow-lg">
                <i class="fa-solid fa-icons text-lg"></i>
                Kho Icon FontAwesome (R)
            </button>
        </div>

        <!-- Dynamic Instruction Banner -->
        <div id="tabDescription" class="mb-8 p-4 bg-zinc-900/60 backdrop-blur-md border border-zinc-700/50 rounded-xl text-zinc-300 text-sm md:text-base transition-all duration-300 shadow-sm mx-auto max-w-4xl text-center">
            <!-- Text injected via JS -->
        </div>

        <!-- Controls Section (Glass Panel) -->
        <div class="bg-zinc-900/40 backdrop-blur-xl border border-white/5 shadow-[0_8px_32px_0_rgba(0,0,0,0.5)] rounded-2xl p-4 sm:p-6 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between">
            
            <!-- Search Input -->
            <div class="relative w-full md:w-1/2">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-zinc-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Tìm theo tên..."
                    class="w-full pl-11 pr-4 py-2.5 bg-zinc-800/40 border border-zinc-700/50 rounded-xl focus:outline-none focus:ring-2 focus:ring-zinc-500/50 focus:bg-zinc-800/80 transition-all placeholder-zinc-500 text-zinc-200 shadow-sm"
                />
            </div>

            <!-- Level/Category Filter -->
            <div class="relative w-full md:w-auto min-w-[200px]">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-zinc-400">
                    <i class="fa-solid fa-filter"></i>
                </div>
                <select
                    id="categoryFilter"
                    class="w-full pl-11 pr-10 py-2.5 appearance-none bg-zinc-800/40 border border-zinc-700/50 rounded-xl focus:outline-none focus:ring-2 focus:ring-zinc-500/50 focus:bg-zinc-800/80 transition-all text-zinc-200 shadow-sm cursor-pointer"
                >
                    <!-- Options sẽ được render bằng JS -->
                </select>
                <!-- Custom Dropdown Arrow -->
                <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
                    <i class="fa-solid fa-chevron-down text-sm text-zinc-400"></i>
                </div>
            </div>
        </div>

        <!-- Status indicator -->
        <div id="statusIndicator" class="mb-4 text-zinc-400 font-medium px-2 text-sm">
            Đang tải dữ liệu...
        </div>

        <!-- Dynamic Grid (Colors or Icons) -->
        <div id="mainGrid" class="grid grid-cols-2 min-[480px]:grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 2xl:grid-cols-10 gap-3 sm:gap-4">
            <!-- Items sẽ được render bằng JS -->
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 transition-all duration-500 transform translate-y-10 opacity-0 pointer-events-none">
        <div class="bg-zinc-800 text-zinc-100 px-5 py-2.5 sm:px-6 sm:py-3 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.8)] text-sm sm:text-base font-medium flex items-center gap-2 border border-zinc-600/50">
            <i class="fa-solid fa-circle-check text-zinc-300"></i>
            <span id="toastMessage">Đã sao chép!</span>

    </div>

        let currentTab = 'colors'; // 'colors' or 'icons'

        const categoryFilter = document.getElementById('categoryFilter');
        const mainGrid = document.getElementById('mainGrid');

        // Khởi tạo các Filters tùy theo tab
        function updateFilters() {
            categoryFilter.innerHTML = '';
            
            const optionAll = document.createElement('option');
            optionAll.value = 'Tất cả';
            optionAll.textContent = 'Tất cả danh mục';
            optionAll.className = "bg-zinc-800 text-zinc-200";
            categoryFilter.appendChild(optionAll);

            let uniqueCategories = [];
            if (currentTab === 'colors') {
                searchInput.placeholder = "Tìm theo tên màu hoặc mã Hex...";
                uniqueCategories = [...new Set(colorData.map(c => c.level))];
            } else {
                searchInput.placeholder = "Tìm theo tên Icon (vd: chart, user, folder)...";
                uniqueCategories = [...new Set(iconData.map(i => i.cat))];
            }

            uniqueCategories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                option.className = "bg-zinc-800 text-zinc-200";
                categoryFilter.appendChild(option);
            });
        }

        // Chuyển Tab và Cập nhật Hướng dẫn
        window.switchTab = function(tab) {
            currentTab = tab;
            
            const btnColors = document.getElementById('tab-colors');
            const btnIcons = document.getElementById('tab-icons');

            if (tab === 'colors') {
                btnColors.className = "tab-active backdrop-blur-md px-6 py-3 rounded-xl border font-semibold flex items-center gap-2 transition-all duration-300 shadow-lg";
                btnIcons.className = "tab-inactive backdrop-blur-md px-6 py-3 rounded-xl border font-semibold flex items-center gap-2 transition-all duration-300 shadow-lg";
                
                // Hướng dẫn R cho Tab Màu Sắc
                tabDescription.innerHTML = `
                    <i class="fa-solid fa-circle-info text-blue-400 mr-2"></i> 
                    <b>Mẹo dùng cho R:</b> Toàn bộ tên màu dưới đây đã được chuẩn hóa (không có khoảng trắng) và <b>100% chạy được trong R base</b>. Bạn có thể sử dụng trực tiếp tên màu (vd: <code>col = "aliceblue"</code>, <code>fill = "lightpink1"</code>) hoặc mã Hex (vd: <code>col = "#f0f8ff"</code>) cho hàm <code>plot()</code>, hoặc thư viện <code>ggplot2</code>.
                `;
            } else {
                btnIcons.className = "tab-active backdrop-blur-md px-6 py-3 rounded-xl border font-semibold flex items-center gap-2 transition-all duration-300 shadow-lg";
                btnColors.className = "tab-inactive backdrop-blur-md px-6 py-3 rounded-xl border font-semibold flex items-center gap-2 transition-all duration-300 shadow-lg";
                
                // Hướng dẫn R cho Tab Icon
                tabDescription.innerHTML = `
                    <i class="fa-solid fa-circle-info text-blue-400 mr-2"></i> 
                    <b>Mẹo dùng cho R:</b> Đầu tiên cần cài đặt package qua lệnh: <code>install.packages("fontawesome")</code>. Sau đó hãy bấm nút <b>Copy R Code</b> trên thẻ Icon bạn thích và dán vào R Shiny, Quarto hoặc R Markdown (vd: <code>fa("chart-bar", fill = "steelblue")</code>).
                `;
            }

            searchInput.value = '';
            updateFilters();
            renderContent();
        }

        // Copy Clipboard đa năng
        window.copyText = function(text, type) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast(`Đã sao chép ${type}: ${text}`);
            } catch (err) {
                console.error('Không thể sao chép!', err);
            }
            
            document.body.removeChild(textArea);
        };

        // Toast thông báo
        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.remove('translate-y-10', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0', 'pointer-events-none');
            }, 3000);
        }

            const filterVal = categoryFilter.value;

            if (currentTab === 'colors') {
                renderColors(searchVal, filterVal);
            } else {
                renderIcons(searchVal, filterVal);
            }
        }

        function renderColors(searchVal, filterVal) {
            const filteredColors = colorData.filter(color => {
                const matchSearch = color.name.toLowerCase().includes(searchVal) || color.hex.toLowerCase().includes(searchVal);
                const matchLevel = filterVal === 'Tất cả' || color.level === filterVal;
                return matchSearch && matchLevel;
            });

            statusIndicator.innerHTML = `Đang hiển thị <b class="text-white">${filteredColors.length}</b> màu sắc`;

            if (filteredColors.length === 0) {
                mainGrid.innerHTML = `<div class="col-span-full py-16 text-center text-zinc-500 font-medium text-sm sm:text-base bg-zinc-900/40 backdrop-blur-md border border-white/5 rounded-2xl">Không tìm thấy màu nào phù hợp.</div>`;
                return;
            }

            const copyIconSVG = `<i class="fa-regular fa-copy"></i>`;

            mainGrid.innerHTML = filteredColors.map(color => `
                <div class="group bg-zinc-900/40 backdrop-blur-md border border-white/5 hover:bg-zinc-800/60 hover:border-zinc-600/50 hover:shadow-[0_4px_20px_rgba(0,0,0,0.5)] hover:-translate-y-1 transition-all duration-200 rounded-2xl p-2.5 sm:p-3 flex flex-col gap-2 shadow-sm">
                    <div class="w-full h-16 sm:h-20 rounded-xl shadow-[inset_0_2px_10px_rgba(0,0,0,0.8)] border border-white/10" style="background-color: ${color.hex}"></div>
                    <div class="flex flex-col gap-2 flex-grow mt-1">
                        <span class="text-[9px] uppercase tracking-wider font-bold px-2 py-0.5 bg-zinc-800/80 text-zinc-300 rounded-full w-fit border border-zinc-700/50">
                            ${color.level}
                        </span>
                        <div class="flex items-center justify-between group/btn gap-1">
                            <div class="font-semibold text-xs sm:text-sm text-zinc-200 truncate" title="${color.name}">${color.name}</div>
                            <button onclick="copyText('${color.name}', 'Tên màu')" class="p-1.5 bg-zinc-800/50 hover:bg-zinc-700 border border-transparent hover:border-zinc-500/50 text-zinc-400 rounded-lg transition-all active:scale-90 flex-shrink-0" title="Copy tên màu">${copyIconSVG}</button>
                        </div>
                        <div class="flex items-center justify-between mt-auto gap-1">
                            <div class="font-mono text-[10px] sm:text-xs text-zinc-400 font-medium truncate">${color.hex.toUpperCase()}</div>
                            <button onclick="copyText('${color.hex}', 'Mã Hex')" class="p-1.5 bg-zinc-800/50 hover:bg-zinc-700 border border-transparent hover:border-zinc-500/50 text-zinc-400 rounded-lg transition-all active:scale-90 flex-shrink-0" title="Copy mã Hex">${copyIconSVG}</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Render Kho Icon
        function renderIcons(searchVal, filterVal) {
            const filteredIcons = iconData.filter(icon => {
                const matchSearch = icon.name.toLowerCase().includes(searchVal);
                const matchCat = filterVal === 'Tất cả' || icon.cat === filterVal;
                return matchSearch && matchCat;
            });

            statusIndicator.innerHTML = `Đang hiển thị <b class="text-white">${filteredIcons.length}</b> icons`;

            if (filteredIcons.length === 0) {
                mainGrid.innerHTML = `<div class="col-span-full py-16 text-center text-zinc-500 font-medium text-sm sm:text-base bg-zinc-900/40 backdrop-blur-md border border-white/5 rounded-2xl">Không tìm thấy icon nào phù hợp.</div>`;
                return;
            }

            mainGrid.innerHTML = filteredIcons.map(icon => {
                return `
                <div class="group bg-zinc-900/40 backdrop-blur-md border border-white/5 hover:bg-zinc-800/60 hover:border-zinc-600/50 hover:shadow-[0_4px_20px_rgba(0,0,0,0.5)] hover:-translate-y-1 transition-all duration-200 rounded-2xl p-3 sm:p-4 flex flex-col items-center justify-center gap-3 shadow-sm relative overflow-hidden">
                    
                    <!-- Icon Display -->
                    <div class="h-16 w-full flex items-center justify-center text-4xl sm:text-5xl text-zinc-300 drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] group-hover:scale-110 group-hover:text-white transition-all duration-300">
                        <i class="${icon.style} fa-${icon.name}"></i>
                    </div>

                    <!-- Category Badge -->
                    <span class="text-[9px] uppercase tracking-wider font-bold px-2 py-0.5 bg-zinc-800/80 text-zinc-400 rounded-full w-fit border border-zinc-700/50 mt-1 truncate max-w-full text-center">
                        ${icon.cat}
                    </span>

                    <!-- Icon Name Display -->
                    <div class="font-mono text-xs text-zinc-300 font-medium truncate w-full text-center" title="${icon.name}">
                        ${icon.name}
                    </div>

                    <!-- Copy Actions Layer (Appears on Hover) -->
                    <div class="absolute inset-0 bg-zinc-950/90 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col items-center justify-center gap-2 p-2">
                        <button onclick="copyText('${icon.name}', 'Tên Icon')" class="w-full text-xs py-1.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 hover:border-zinc-400 text-zinc-200 rounded-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-i-cursor"></i> Tên Icon
                        </button>
                        <button onclick="copyText('fa(\\'${icon.name}\\')', 'R Code')" class="w-full text-xs py-1.5 bg-neutral-800/80 hover:bg-neutral-700 border border-neutral-600/50 hover:border-neutral-400 text-white rounded-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i class="fa-brands fa-r-project"></i> R Code
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        // Event Listeners
        searchInput.addEventListener('input', renderContent);
        categoryFilter.addEventListener('change', renderContent);

        // Run on load
        switchTab('colors'); // Initialize default tab to show description
    </script>
</body>
</html>
