<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Màu Glassmorphism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tùy chỉnh thanh cuộn cho đẹp hơn */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.5); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(147, 197, 253, 0.8); 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(96, 165, 250, 1); 
        }
    </style>
</head>
<body class="min-h-screen font-sans relative overflow-x-hidden bg-[#e0f2fe] text-slate-800 selection:bg-blue-300 selection:text-blue-900">

    <!-- Background Animated Blobs for Glassmorphism Effect -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-300 opacity-40 blur-[100px] animate-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-cyan-300 opacity-40 blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>
        <div class="absolute top-[30%] left-[60%] w-[30%] h-[30%] rounded-full bg-sky-200 opacity-50 blur-[80px] animate-pulse" style="animation-delay: 4s;"></div>
    </div>

    <!-- Main Container -->
    <div class="relative z-10 container mx-auto px-4 py-8 max-w-[1600px]">
        
        <!-- Header Section -->
        <div class="mb-8 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold mb-3 text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 drop-shadow-sm">
                Bảng Màu Glassmorphism
            </h1>
            <p class="text-base text-blue-800/70 font-medium">
                Khám phá và sao chép hơn 160+ màu chuẩn và pastel hiện đại
            </p>
        </div>

        <!-- Controls Section (Glass Panel) -->
        <div class="bg-white/40 backdrop-blur-xl border border-white/60 shadow-[0_8px_32px_0_rgba(31,38,135,0.05)] rounded-2xl p-4 sm:p-6 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between">
            
            <!-- Search Input -->
            <div class="relative w-full md:w-1/2">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-blue-600/60">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Tìm theo tên màu hoặc mã Hex..."
                    class="w-full pl-11 pr-4 py-2.5 bg-white/50 border border-white/70 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white/80 transition-all placeholder-blue-600/40 text-blue-900 shadow-sm"
                />
            </div>

            <!-- Level Filter -->
            <div class="relative w-full md:w-auto min-w-[200px]">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-blue-600/60">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                </div>
                <select
                    id="levelFilter"
                    class="w-full pl-11 pr-10 py-2.5 appearance-none bg-white/50 border border-white/70 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white/80 transition-all text-blue-900 shadow-sm cursor-pointer"
                >
                    <!-- Options sẽ được render bằng JS -->
                </select>
                <!-- Custom Dropdown Arrow -->
                <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
                    <svg class="w-4 h-4 text-blue-600/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </div>

        <!-- Status indicator -->
        <div id="statusIndicator" class="mb-4 text-blue-700/80 font-medium px-2 text-sm">
            Đang hiển thị...
        </div>

        <!-- Colors Grid -->
        <div id="colorGrid" class="grid grid-cols-2 min-[480px]:grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 2xl:grid-cols-10 gap-3 sm:gap-4">
            <!-- Items sẽ được render bằng JS -->
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 transition-all duration-500 transform translate-y-10 opacity-0 pointer-events-none">
        <div class="bg-blue-800 text-white px-5 py-2.5 sm:px-6 sm:py-3 rounded-full shadow-lg text-sm sm:text-base font-medium flex items-center gap-2 border border-blue-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-300"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <span id="toastMessage">Đã sao chép!</span>
        </div>
    </div>

        const levels = ['Tất cả', 'CSS Level 1', 'CSS Level 2', 'CSS Level 3', 'CSS Level 4', 'Modern Pastel'];

        const searchInput = document.getElementById('searchInput');
        const levelFilter = document.getElementById('levelFilter');
        const colorGrid = document.getElementById('colorGrid');
        const statusIndicator = document.getElementById('statusIndicator');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        let toastTimeout;

        // Initialize Filter Dropdown
        function initFilter() {
            levels.forEach(level => {
                const option = document.createElement('option');
                option.value = level;
                option.textContent = level;
                levelFilter.appendChild(option);
            });
        }

        // Sao chép vào Clipboard
        window.copyColor = function(text, type) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast(`Đã sao chép ${type}: ${text}`);
            } catch (err) {
                console.error('Không thể sao chép!', err);
            }
            
            document.body.removeChild(textArea);
        };

        // Hiển thị Toast
        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.remove('translate-y-10', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // Render Colors
        function renderColors() {
            const searchVal = searchInput.value.toLowerCase();
            const levelVal = levelFilter.value;

            const filteredColors = colorData.filter(color => {
                const matchSearch = color.name.toLowerCase().includes(searchVal) || color.hex.toLowerCase().includes(searchVal);
                const matchLevel = levelVal === 'Tất cả' || color.level === levelVal;
                return matchSearch && matchLevel;
            });

            statusIndicator.textContent = `Đang hiển thị ${filteredColors.length} màu sắc`;

            if (filteredColors.length === 0) {
                colorGrid.innerHTML = `
                    <div class="col-span-full py-16 text-center text-blue-700/60 font-medium text-sm sm:text-base bg-white/30 backdrop-blur-md border border-white/60 rounded-2xl">
                        Không tìm thấy màu nào phù hợp.
                    </div>
                `;
                return;
            }

            const copyIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;

            colorGrid.innerHTML = filteredColors.map(color => `
                <div class="group bg-white/40 backdrop-blur-md border border-white/60 hover:bg-white/60 hover:shadow-[0_4px_20px_rgb(0,0,0,0.08)] hover:-translate-y-1 transition-all duration-200 rounded-2xl p-2.5 sm:p-3 flex flex-col gap-2 shadow-sm">
                    
                    <!-- Color Visual Block -->
                    <div class="w-full h-16 sm:h-20 rounded-xl shadow-[inset_0_2px_10px_rgba(0,0,0,0.1)] border border-black/5" style="background-color: ${color.hex}"></div>

                    <!-- Color Details -->
                    <div class="flex flex-col gap-2 flex-grow">
                        <!-- Level Badge -->
                        <span class="text-[9px] uppercase tracking-wider font-bold px-2 py-0.5 bg-blue-100/60 text-blue-700 rounded-full w-fit border border-blue-200/50">
                            ${color.level}
                        </span>

                        <!-- Name -->
                        <div class="flex items-center justify-between group/btn gap-1">
                            <div class="font-semibold text-xs sm:text-sm text-slate-700 truncate capitalize" title="${color.name}">
                                ${color.name}
                            </div>
                            <button onclick="copyColor('${color.name}', 'Tên màu')" class="p-1.5 bg-white/50 hover:bg-blue-100 border border-transparent hover:border-blue-200 text-blue-600 rounded-lg transition-all active:scale-90 flex-shrink-0" title="Copy tên màu">
                                ${copyIcon}
                            </button>
                        </div>

                        <!-- Hex Code -->
                        <div class="flex items-center justify-between mt-auto gap-1">
                            <div class="font-mono text-[10px] sm:text-xs text-slate-500 font-medium truncate">
                                ${color.hex.toUpperCase()}
                            </div>
                            <button onclick="copyColor('${color.hex}', 'Mã Hex')" class="p-1.5 bg-white/50 hover:bg-blue-100 border border-transparent hover:border-blue-200 text-blue-600 rounded-lg transition-all active:scale-90 flex-shrink-0" title="Copy mã Hex">
                                ${copyIcon}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Event Listeners
        searchInput.addEventListener('input', renderColors);
        levelFilter.addEventListener('change', renderColors);

        // Run on load
        initFilter();
        renderColors();
    </script>
</body>
</html>
